databases:
  - name: kwplanner-db
    plan: free
    databaseName: kwplanner
    user: kwplanner

services:
  # ── Backend (FastAPI) ──────────────────────────────────
  - type: web
    name: kwplanner-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt asyncpg
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: kwplanner-db
          property: connectionURI
      - key: FRONTEND_URL
        fromService:
          name: kwplanner-web
          type: static
          property: url
      - key: BACKEND_URL
        fromService:
          name: kwplanner-api
          type: web
          property: url
      - key: GOOGLE_ADS_DEVELOPER_TOKEN
        sync: false
      - key: GOOGLE_ADS_LOGIN_CUSTOMER_ID
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false

  # ── Frontend (React SPA) ───────────────────────────────
  - type: static
    name: kwplanner-web
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
